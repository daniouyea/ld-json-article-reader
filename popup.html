<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LD+JSON Article Reader</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="hero">
        <p class="eyebrow">Structured Data Reader</p>
        <h1>Scan the current page</h1>
        <p class="hero-copy">
          Extract article text from LD+JSON metadata and open it in a clean reading view.
        </p>
        <div class="hero-actions">
          <button id="scanButton" class="primary-button" type="button">Scan tab</button>
        </div>
      </header>

      <section class="status-panel" aria-live="polite">
        <p id="statusText">Ready to scan the active tab.</p>
      </section>

      <section class="results-panel">
        <div class="results-header">
          <h2>Matches</h2>
          <span id="resultCount" class="result-count">0</span>
        </div>
        <div id="resultsContainer" class="results-container"></div>
      </section>
    </main>

    <template id="resultCardTemplate">
      <article class="result-card">
        <div class="result-topline">
          <span class="result-badge"></span>
          <span class="result-script"></span>
        </div>
        <h3 class="result-title"></h3>
        <p class="result-meta"></p>
        <p class="result-preview"></p>
        <details class="result-details">
          <summary>Inspect source metadata</summary>
          <pre class="result-json"></pre>
        </details>
        <button class="secondary-button open-button" type="button">Open reader</button>
      </article>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
